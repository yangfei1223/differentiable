<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Differentiable Baker — PBR Viewer</title>
  <style>
    /* ===== Design System ===== */
    :root {
      --viewer-bg: #1a1a1a;
      --overlay-bg: rgba(20, 20, 24, 0.82);
      --overlay-border: rgba(255, 255, 255, 0.08);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.65);
      --accent: #00ff88;
      --accent-dim: rgba(0, 255, 136, 0.15);
      --error: #ff6b6b;
      --radius: 8px;
      --shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'SF Mono', Consolas, 'Courier New', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--viewer-bg); font-family: var(--font-ui); }
    #app { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }

    /* ===== Toolbar (ScenePicker) ===== */
    .viewer-toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--overlay-bg);
      border: 1px solid var(--overlay-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-primary);
    }

    .viewer-toolbar-label {
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ===== Custom Dropdown ===== */
    .viewer-dropdown-wrapper { position: relative; }

    .viewer-dropdown-trigger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--overlay-border);
      border-radius: 5px;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      outline: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .viewer-dropdown-trigger:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .viewer-dropdown-trigger:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .viewer-dropdown-trigger[aria-expanded="true"] {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .viewer-dropdown-chevron {
      flex-shrink: 0;
      opacity: 0.6;
      transition: transform 0.2s;
    }

    .viewer-dropdown-trigger[aria-expanded="true"] .viewer-dropdown-chevron {
      transform: rotate(180deg);
    }

    .viewer-dropdown-trigger-text {
      min-width: 50px;
      text-align: left;
    }

    .viewer-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 200px;
      max-height: 280px;
      overflow-y: auto;
      background: #252528;
      border: 1px solid var(--overlay-border);
      border-radius: 6px;
      box-shadow: var(--shadow);
      z-index: 20;
      padding: 4px 0;
    }

    .viewer-dropdown[hidden] { display: none; }

    .viewer-dropdown-option {
      padding: 7px 14px;
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .viewer-dropdown-option:hover,
    .viewer-dropdown-option--highlighted {
      background: var(--accent-dim);
    }

    .viewer-dropdown-option[aria-selected="true"] {
      color: var(--accent);
      font-weight: 500;
    }

    .viewer-dropdown-option[aria-selected="true"]::after {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .viewer-dropdown-option--empty {
      color: var(--text-secondary);
      cursor: default;
      font-style: italic;
    }

    /* ===== Toolbar hint ===== */
    .viewer-toolbar-hint {
      color: var(--text-secondary);
      font-size: 11px;
      opacity: 0.5;
      cursor: help;
      border-bottom: 1px dotted currentColor;
    }

    .viewer-toolbar-hint:hover { opacity: 0.85; }

    /* ===== Error Toast ===== */
    .viewer-error-toast {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 18px;
      background: rgba(220, 50, 50, 0.92);
      color: white;
      font-family: var(--font-ui);
      font-size: 13px;
      border-radius: 6px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .viewer-error-toast--visible { opacity: 1; }

    /* ===== Drop Zone ===== */
    .viewer-drop-zone {
      position: absolute;
      inset: 0;
      z-index: 90;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 255, 136, 0.05);
      border: 2px dashed var(--accent);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .viewer-drop-zone--active { opacity: 1; }

    .viewer-drop-zone-text {
      color: var(--accent);
      font-family: var(--font-ui);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }

    /* ===== Performance Stats ===== */
    .viewer-overlay-stack {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      max-width: 280px;
    }

    .viewer-perf-stats {
      padding: 10px 14px;
      background: var(--overlay-bg);
      border: 1px solid var(--overlay-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.7;
      min-width: 140px;
    }

    .viewer-perf-title {
      font-family: var(--font-ui);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 4px;
      opacity: 0.5;
    }

    .viewer-perf-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .viewer-perf-label { color: var(--text-secondary); }
    .viewer-perf-value { text-align: right; color: var(--accent); }

    /* ===== Camera Info ===== */
    .viewer-camera-info {
      padding: 10px 14px;
      background: var(--overlay-bg);
      border: 1px solid var(--overlay-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 11px;
      line-height: 1.7;
      min-width: 220px;
    }

    .viewer-camera-mono {
      font-size: 10.5px;
      letter-spacing: -0.02em;
    }

    .viewer-camera-hash {
      margin-top: 4px;
      padding: 3px 6px;
      font-size: 9.5px;
      color: var(--text-secondary);
      background: rgba(0, 0, 0, 0.25);
      border-radius: 3px;
      word-break: break-all;
      transition: color 0.2s, background 0.2s;
    }

    .viewer-camera-hash:hover {
      color: var(--accent);
      background: rgba(0, 0, 0, 0.4);
    }

    .viewer-camera-copied {
      color: #6f6 !important;
      background: rgba(0, 64, 0, 0.4) !important;
    }

    /* ===== Loading Overlay ===== */
    .viewer-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      color: var(--text-primary);
      font-family: var(--font-ui);
      z-index: 100;
      opacity: 1;
      transition: opacity 0.35s ease;
    }

    .viewer-loading--hidden {
      opacity: 0;
      pointer-events: none;
    }

    .viewer-loading--error {
      border: 2px solid var(--error);
      box-shadow: inset 0 0 40px rgba(255, 107, 107, 0.08);
    }

    .viewer-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: viewer-spin 0.8s linear infinite;
    }

    .viewer-loading-text {
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.85;
    }

    @keyframes viewer-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
