data:
  mesh_path: "data/scene/lowpoly.obj"
  gt_dir: "data/gt"
  camera_path: "data/cameras.json"

texture:
  sh_order: 2
  base_resolution: 512
  target_resolution: 4096
  init_dc_value: 0.5

training:
  num_epochs: 2000
  lr: 0.01
  lr_decay: 0.5
  lr_decay_epochs: [500, 1000, 1500]
  batch_size: 4
  resolution_schedule:
    - { epoch: 0, resolution: 512 }
    - { epoch: 300, resolution: 1024 }
    - { epoch: 700, resolution: 2048 }
    - { epoch: 1100, resolution: 4096 }

loss:
  lambda_l1: 1.0
  lambda_ssim: 0.2
  lambda_tv: 0.005

seam_padding:
  dilation_radius: 3
  apply_every_n_epochs: 50

export:
  output_dir: "output"
  format: "gltf"
  sh_truncate_order: -1
