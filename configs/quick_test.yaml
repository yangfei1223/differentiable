data:
  mesh_path: "data/piano_260604/scene/lowpoly.glb"
  gt_dir: "data/piano_260604/gt"
  camera_path: "data/piano_260604/cameras.json"

texture:
  sh_order: 2
  base_resolution: 512
  target_resolution: 512
  init_dc_value: 0.5

training:
  num_epochs: 50
  lr: 0.01
  rest_lr_ratio: 0.05
  lr_decay: 0.5
  lr_decay_epochs: [30]
  batch_size: 2
  resolution_schedule:
    - { epoch: 0, resolution: 512 }

loss:
  lambda_l1: 1.0
  lambda_ssim: 0.2
  lambda_tv: 0.005

seam_padding:
  dilation_radius: 3
  apply_every_n_epochs: 50

export:
  output_dir: "output"
  format: "gltf"
  sh_truncate_order: -1

uv_optimization:
  enabled: true
  lr: 0.001
  tex_steps_per_uv: 3
  sym_dirichlet_weight: 0.01
  area_preserve_weight: 0.1
  lbfgs_max_iter: 5
  start_epoch: 2
